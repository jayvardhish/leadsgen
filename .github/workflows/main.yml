name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          flutter create . --platforms=android
          flutter pub get
        working-directory: flutter_code

      - name: Build APK
        run: flutter build apk --release
        working-directory: flutter_code

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-release
          path: flutter_code/build/app/outputs/flutter-apk/app-release.apk
